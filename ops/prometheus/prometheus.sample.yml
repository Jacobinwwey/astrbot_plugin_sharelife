global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/sharelife-webui-alerts.rules.yml

scrape_configs:
  - job_name: sharelife-webui
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - sharelife-webui:8106
        labels:
          service: sharelife-webui
