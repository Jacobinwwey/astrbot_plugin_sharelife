    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
        <defs>
            <!-- 平台主背景渐变 -->
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#111827"/>
                <stop offset="100%" stop-color="#030712"/>
            </radialGradient>

            <!-- 翠绿色：代表上传、创造、生命力 (Life) -->
            <linearGradient id="uploadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#34d399" />
                <stop offset="100%" stop-color="#059669" />
            </linearGradient>

            <!-- 紫红色：代表下载、魔法、模板包 (Template) -->
            <linearGradient id="downloadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#c084fc" />
                <stop offset="100%" stop-color="#7e22ce" />
            </linearGradient>

            <!-- 青蓝色：代表设置、终端、AstrBot (Prompt/Bot) -->
            <linearGradient id="setupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#38bdf8" />
                <stop offset="100%" stop-color="#0284c7" />
            </linearGradient>

            <!-- 数据流线连线渐变 -->
            <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
            </linearGradient>
            <linearGradient id="line2" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
            </linearGradient>
            <linearGradient id="line3" x1="50%" y1="100%" x2="50%" y2="0%">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
            </linearGradient>

            <!-- 发光滤镜 -->
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
            <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="10" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- 底板 -->
        <rect width="500" height="500" fill="url(#bgGrad)" rx="70" />

        <!-- 装饰性背景网格 (代表平台基础设施) -->
        <g stroke="#1f2937" stroke-width="1" opacity="0.5">
            <line x1="100" y1="0" x2="100" y2="500" stroke-dasharray="4 4"/>
            <line x1="250" y1="0" x2="250" y2="500" stroke-dasharray="4 4"/>
            <line x1="400" y1="0" x2="400" y2="500" stroke-dasharray="4 4"/>
            <line x1="0" y1="100" x2="500" y2="100" stroke-dasharray="4 4"/>
            <line x1="0" y1="220" x2="500" y2="220" stroke-dasharray="4 4"/>
            <line x1="0" y1="340" x2="500" y2="340" stroke-dasharray="4 4"/>
        </g>

        <!-- 社区原子轨道 / 社群网络环 (Life / Community Orbits) -->
        <g transform="translate(0, -15)">
            <ellipse cx="250" cy="220" rx="140" ry="50" fill="none" stroke="#334155" stroke-width="1.5" transform="rotate(30 250 220)"/>
            <ellipse cx="250" cy="220" rx="140" ry="50" fill="none" stroke="#334155" stroke-width="1.5" transform="rotate(-30 250 220)"/>
            <ellipse cx="250" cy="220" rx="140" ry="50" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.4" transform="rotate(90 250 220)"/>

            <!-- 轨道上的发光数据粒子 -->
            <circle cx="160" cy="115" r="2.5" fill="#34d399" filter="url(#glow)"/>
            <circle cx="340" cy="115" r="2.5" fill="#c084fc" filter="url(#glow)"/>
            <circle cx="250" cy="360" r="2.5" fill="#38bdf8" filter="url(#glow)"/>
        </g>

        <!-- 核心层：中心枢纽与三个子节点连线 -->
        <g transform="translate(0, -15)">
            <!-- 连线：Upload(左上) -> Hub -->
            <line x1="140" y1="120" x2="230" y2="195" stroke="url(#line1)" stroke-width="4" stroke-linecap="round"/>
            <!-- 连线：Download(右上) -> Hub -->
            <line x1="360" y1="120" x2="270" y2="195" stroke="url(#line2)" stroke-width="4" stroke-linecap="round"/>
            <!-- 连线：Setup(下方) -> Hub -->
            <line x1="250" y1="330" x2="250" y2="245" stroke="url(#line3)" stroke-width="4" stroke-linecap="round"/>

            <!-- ========================================== -->
            <!-- 节点1: UPLOAD / 创造生命 (翠绿色 左上)       -->
            <!-- ========================================== -->
            <circle cx="130" cy="110" r="32" fill="#064e3b" stroke="url(#uploadGrad)" stroke-width="3" filter="url(#glow)"/>
            <circle cx="130" cy="110" r="32" fill="url(#uploadGrad)" opacity="0.2" />
            <!-- 上传图标 (向上的箭头与托盘) -->
            <path d="M 130 118 L 130 98 M 122 106 L 130 96 L 138 106 M 118 122 L 142 122" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- ========================================== -->
            <!-- 节点2: DOWNLOAD / 模板下载 (紫红色 右上)     -->
            <!-- ========================================== -->
            <circle cx="370" cy="110" r="32" fill="#4c1d95" stroke="url(#downloadGrad)" stroke-width="3" filter="url(#glow)"/>
            <circle cx="370" cy="110" r="32" fill="url(#downloadGrad)" opacity="0.2" />
            <!-- 下载图标 (向下的箭头与托盘) -->
            <path d="M 370 98 L 370 118 M 362 110 L 370 120 L 378 110 M 358 126 L 382 126" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- ========================================== -->
            <!-- 节点3: PROMPT / Agent设置 (青蓝色 正下)      -->
            <!-- ========================================== -->
            <circle cx="250" cy="345" r="32" fill="#0c4a6e" stroke="url(#setupGrad)" stroke-width="3" filter="url(#glow)"/>
            <circle cx="250" cy="345" r="32" fill="url(#setupGrad)" opacity="0.2" />
            <!-- 终端/Prompt 图标 (>_) -->
            <path d="M 238 338 L 246 345 L 238 352 M 250 355 L 262 355" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- ========================================== -->
            <!-- 中心枢纽 (Platform Core): 盛放 Agent 的六边形 -->
            <!-- ========================================== -->
            <!-- 底座光晕 -->
            <polygon points="250,150 310,185 310,255 250,290 190,255 190,185" fill="#38bdf8" opacity="0.15" filter="url(#glowStrong)"/>
            <!-- 几何平台外框 -->
            <polygon points="250,150 310,185 310,255 250,290 190,255 190,185" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
            <polygon points="250,165 295,192 295,247 250,275 205,247 205,192" fill="none" stroke="#818cf8" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

            <!-- AstrBot 核心星芒 (封装在平台内的 AI 灵魂) -->
            <path d="M 250 175 Q 250 220 205 220 Q 250 220 250 265 Q 250 220 295 220 Q 250 220 250 175 Z" fill="url(#setupGrad)" filter="url(#glow)"/>
            <path d="M 250 190 Q 250 220 220 220 Q 250 220 250 250 Q 250 220 280 220 Q 250 220 250 190 Z" fill="#ffffff" opacity="0.9"/>
            <!-- 中心闪耀核心 -->
            <circle cx="250" cy="220" r="4" fill="#fff" filter="url(#glow)"/>
        </g>

        <!-- 底部文字排版 -->
        <g transform="translate(0, 5)">
            <!-- ShareLife 主标题 -->
            <text x="250" y="435" font-family="'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">
                Share<tspan fill="#34d399">Life</tspan>
            </text>
            <!-- 平台副标题 -->
            <text x="250" y="465" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="4">
                AGENT COMMUNITY PLATFORM
            </text>
        </g>
    </svg>
