name: deploy-docs-github-pages

"on":
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "templates/**"
      - "scripts/build_market_snapshot.py"
      - "README.md"
      - ".github/workflows/deploy-docs-github-pages.yml"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Optional git ref for rollback or replay"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages_ready.outputs.ready }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure GitHub Pages (best effort)
        id: configure_pages
        uses: actions/configure-pages@v6
        continue-on-error: true
        with:
          # Try to auto-enable Pages on first run when a PAT is provided.
          # GITHUB_TOKEN alone cannot create a missing Pages site.
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN || github.token }}

      - name: Resolve pages readiness
        id: pages_ready
        shell: bash
        run: |
          if [[ "${{ steps.configure_pages.outcome }}" == "success" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::warning::GitHub Pages is not ready for deployment. Enable Pages -> Build and deployment -> Source=GitHub Actions, or provide secret PAGES_ENABLEMENT_TOKEN (repo admin PAT)."
          echo "ready=false" >> "$GITHUB_OUTPUT"

      - name: Install docs dependencies
        run: npm ci --prefix docs

      - name: Build docs for GitHub Pages
        run: DOCS_BASE=/astrbot_plugin_sharelife/ npm run docs:build --prefix docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    if: needs.build.outputs.pages_ready == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
